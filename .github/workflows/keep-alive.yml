name: Keep alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Railway health endpoint
        run: |
          response=$(curl -sf https://lucid-encouragement-production-8df0.up.railway.app/health)
          echo "Response: $response"
          echo "$response" | grep -q '"status":"ok"' && echo "Service healthy" || (echo "Service down" && exit 1)
